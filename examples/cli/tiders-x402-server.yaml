# Example tiders-x402-server configuration.
#
# Run with:
#   tiders-x402-server --config config.yaml
#
# Environment variables can be referenced with ${VAR_NAME} syntax.
# Set them in your shell or a .env file before starting the server.

server:
  bind_address: "0.0.0.0:4021"
  base_url: "http://localhost:4021"

facilitator:
  url: "https://facilitator.x402.rs"
  # timeout: 30          # optional, request timeout in seconds
  # headers:             # optional custom headers
  #   X-Api-Key: "${FACILITATOR_API_KEY}"

database:
  # Exactly one database backend must be specified.

  duckdb:
    path: "../data/duckdb.db"

  # postgresql:
  #   connection_string: "host=${PG_HOST} port=${PG_PORT} user=${PG_USER} password=${PG_PASSWORD} dbname={PG_DB}"
  #   max_pool_size: 16

  # clickhouse:
  #   url: "http://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}"
  #   user: "${CLICKHOUSE_USER}"
  #   password: "${CLICKHOUSE_PASSWORD}"
  #   database: "${CLICKHOUSE_DB}"
  #   compression: "lz4"   # "none" or "lz4"

payment:
  max_timeout_seconds: 300
  default_description: "Query execution payment"

tables:
  - name: uniswap_v3_pool_swap
    description: "Uniswap V3 pool swaps"
    price_tags:
      # Per-row pricing: 0.002 USDC per row (default tier)
      - type: per_row
        pay_to: "0xE7a820f9E05e4a456A7567B79e433cc64A058Ae7"
        token: usdc/base_sepolia
        amount_per_item: "0.002"
        is_default: true

      # Per-row pricing: 0.001 USDC per row for bulk queries (100+ rows)
      - type: per_row
        pay_to: "0xE7a820f9E05e4a456A7567B79e433cc64A058Ae7"
        token: usdc/base_sepolia
        amount_per_item: "0.001"
        min_items: 100

      # Fixed pricing: 1.00 USDC flat fee
      - type: fixed
        pay_to: "0xE7a820f9E05e4a456A7567B79e433cc64A058Ae7"
        token: usdc/base_sepolia
        amount: "1.00"
        description: "Fixed price query"
        
      # fetching GET /table/:name metadata price. 
      - type: metadata_price
        pay_to: "0xE7a820f9E05e4a456A7567B79e433cc64A058Ae7"
        token: usdc/base_sepolia
        amount: "1.00"
        description: "Fixed price query"

  # Example: a free table (no price_tags = no payment required)
  # - name: blocks
  #   description: "blocks, no payment required"

# Optional Dashboards: 
# Command `tiders-x402-server dashboard` scaffold and serve Evidence dashboards pages (https://docs.evidence.studio/core-concepts/markdown).
# Evidence Dashboards are static web apps. Data is only refreshed when the dashboard page is built.
# Is up to the user to implement a single evidence project with multiple pages (dashboards) for each data groups, or one project per dashboard. It trades build/runtime cost for isolation and flexibility.
#
# Each dashboard listed belows becomes a route at <base_url>/<dashboard_name>/. Scaffold a project with:
#   tiders-x402-server dashboard <dashboard_name>
# 
# Per-dashboard paths are optional. If omitted:
#   folder_path defaults to ./dashboards/<dashboard_name>
#   build_path  defaults to <folder_path>/build
# Both are resolved relative to this config file's directory.

dashboards:
  - name: uniswap_v3              # URL-safe slug; reserved: api, assets, static
    # disabled: true
    # folder_path: "./dashboards/uniswap_v3"
    # build_path: "./dashboards/uniswap_v3/build"
